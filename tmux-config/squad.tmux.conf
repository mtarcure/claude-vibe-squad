# ─────────────────────────────────────────────────────────────────────
# .tmux.conf — claude-vibe-squad operator config
# Built 2026-05-03. Targets the navigation-pain points from the squad's
# v1.1 daily use:
#
#   1. "Did Ctrl-b register?" → visible PREFIX indicator in status bar
#   2. "Where am I?"          → persistent window list with active highlight
#   3. "Can't switch windows" → mouse on + Alt+number direct switching
#   4. "Stuck, can't escape"  → F1 = jump straight to chrono pane (no prefix)
#   5. "Too many panes"       → big visible window labels + active pane border
#
# Vanilla tmux 3.x. No plugin manager required.
# ─────────────────────────────────────────────────────────────────────

# === MOUSE: click to switch panes / windows / scroll ===
set -g mouse on

# === STATUS BAR: bigger, more informative, visible ALL the time ===
set -g status on
set -g status-interval 2
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Status LEFT: session name + (PREFIX flash when Ctrl-b is pressed)
set -g status-left-length 50
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] ⚡ #S #[bg=#1e1e2e]#[fg=#89b4fa]#{?client_prefix,#[bg=#f38ba8]#[fg=#1e1e2e]#[bold] ◆ PREFIX ◆ ,}#[bg=#1e1e2e] "

# Status RIGHT: time + active window + pane title
set -g status-right-length 80
set -g status-right "#[fg=#a6adc8] #{pane_current_command} │ %H:%M:%S "

# === WINDOW LIST: every window always visible with name + active highlight ===
set -g window-status-format "#[fg=#7f849c,bg=#1e1e2e] #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W ←─HERE "
set -g window-status-separator ""

# === ACTIVE PANE: bright colored border so you SEE which pane has focus ===
set -g pane-active-border-style "fg=#a6e3a1,bold"
set -g pane-border-style "fg=#45475a"
set -g pane-border-status top
set -g pane-border-format "#[fg=#cdd6f4] #{pane_index}: #{pane_current_command} "

# === DISCOVERABILITY: longer message timeout ===
set -g display-time 2500
set -g display-panes-time 2500

# === HISTORY: keep more scrollback ===
set -g history-limit 10000

# === START WINDOWS AT 0 (matches squad's chrono=0/coding=1/security=2/...) ===
set -g base-index 0
setw -g pane-base-index 0

# ─────────────────────────────────────────────────────────────────────
# KEYBINDINGS — escape from "did Ctrl-b register?" hell
# ─────────────────────────────────────────────────────────────────────

# === ALT+NUMBER: switch windows DIRECTLY without prefix ===
# (Hold Option/Alt + 0/1/2/3/4/5/6 to jump to that window)
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6

# === F1: PANIC KEY — jump straight to chrono (window 0, pane 0) ===
# When stuck anywhere in the squad, F1 brings you home. NO PREFIX NEEDED.
bind -n F1 select-window -t 0 \; select-pane -t 0

# === F2: detach safely (keep squad alive in background) ===
bind -n F2 detach-client

# === F5: reload this config (so future tweaks take effect without restart) ===
bind -n F5 source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# === Easy split panes (still uses prefix, but more memorable than %/") ===
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# === Vim-style pane navigation (with prefix) ===
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Quick reload via prefix + r ===
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# ─────────────────────────────────────────────────────────────────────
# QUALITY OF LIFE
# ─────────────────────────────────────────────────────────────────────
set -g focus-events on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Faster command sequence (no Esc lag in vim/CLIs)
set -s escape-time 10

# Repeat-key window: longer (so prefix-then-number isn't so finicky)
set -g repeat-time 1000

# Activity monitoring: visual notification when bg window has activity
setw -g monitor-activity on
set -g visual-activity off
