version: 1
agent:
  name: research-squad-lead
  extend: default
  system_prompt_path: ./main-prompt.md
  subagents:
    data-extraction-engineer:
      path: ./data-extraction-engineer.yaml
      description: "PDF parsing, dataset wrangling, table extraction, structured-data normalization. Sister to scraping-engineer (Coding) — that one is web-focused; this one is document-focused."
    large-context-analyst:
      path: ./large-context-analyst.yaml
      description: "1M-2M context full-codebase / multi-doc / multi-repo synthesis. Kimi K2's 2M context shines here."
    learning-coach:
      path: ./learning-coach.yaml
      description: "Study plans, drills, spaced repetition, reading ladders, progress checks. For when operator wants to learn something new (a framework, a topic, a skill)."
    research:
      path: ./research.yaml
      description: "Source discovery, multi-source synthesis, claim validation, citation. The primary research specialist (sister to large-context-analyst for synthesis and skeptic for verification)."
    synthesizer:
      path: ./synthesizer.yaml
      description: "Aggregate parallel-fan-out trajectories from multiple specialists/models into a unified report. Preserves outliers — minority findings don't disappear."
