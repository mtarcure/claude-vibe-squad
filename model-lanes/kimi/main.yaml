version: 1
agent:
  name: kimi-model-lead
  extend: default
  system_prompt_path: ./KIMI.md
  subagents:
    growth-and-search-analyst:
      path: ./.kimi/agents/growth-and-search-analyst.yaml
      description: "Registry-generated thin specialist adapter."
    data-extraction-engineer:
      path: ./.kimi/agents/data-extraction-engineer.yaml
      description: "Registry-generated thin specialist adapter."
    experimental-attacker:
      path: ./subagents/experimental-attacker.yaml
      description: "Authorized high-volume experimental probing. Kimi output is a lead only; Claude/Codex validation and mandatory review are required, and ranked non-primary lanes require same-name adapters before dispatch."
    summarizer:
      path: ./.kimi/agents/summarizer.yaml
      description: "Registry-generated thin specialist adapter."
