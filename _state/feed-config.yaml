  # === RESEARCH SOURCES ===
  - name: "arXiv cs.AI"
    type: rss-text
    rss: https://export.arxiv.org/rss/cs.AI
    lane: research
    expected_cadence: daily
    processor: kimi-summarize
    output_dir: _state/blog-summaries/
    notes: |
      High volume (~30-50 papers/day). Triage scorer must filter aggressively.
      cs.AI is the canonical agent/architecture firehose.

  - name: "arXiv cs.CL"
    type: rss-text
    rss: https://export.arxiv.org/rss/cs.CL
    lane: research
    expected_cadence: daily
    processor: kimi-summarize
    output_dir: _state/blog-summaries/

  - name: "arXiv cs.MA"
    type: rss-text
    rss: https://export.arxiv.org/rss/cs.MA
    lane: research
    expected_cadence: daily
    processor: kimi-summarize
    output_dir: _state/blog-summaries/
    notes: Multi-Agent Systems — lower volume, high precision for the operator's interests.

  - name: "Import AI — Jack Clark"
    type: rss-text
    rss: https://importai.substack.com/feed
    lane: research
    expected_cadence: weekly
    processor: kimi-summarize
