  - name: "TLDR AI"
    type: rss-text
    rss: https://tldr.tech/ai/rss
    lane: research
    expected_cadence: daily
    processor: kimi-summarize
    output_dir: _state/blog-summaries/
    notes: Use as triage signal not primary read; headlines shallow but useful for radar.

  - name: "The Gradient"
    type: rss-text
    rss: https://thegradient.pub/rss/
    lane: research
    expected_cadence: irregular
    processor: kimi-summarize
    output_dir: _state/blog-summaries/

  - name: "Twitter via search (followed_people needs_adapter)"
    type: twitter-via-search
    query_source: operator-interests.yaml#followed_people[*] where source==needs_adapter
    lane: practitioner
    expected_cadence: daily
    processor: kimi-summarize
    output_dir: _state/blog-summaries/
    notes: |
      Uses xai_search first, perplexity_search_web fallback, via headless Claude
      subprocess. Caps at 5 results per person per day. Auth: ANTHROPIC_API_KEY
      unset for the Claude subprocess (subscription path).

# Cadence audit: feed-sweep.sh tags each new item:
#   - "on-schedule" if matches expected pattern
#   - "off-schedule" if extra release (highlighted in brief)
#   - "skipped" if expected release missed (only flag if 2+ consecutive misses)

# Idempotent: only processes items not in _state/processed-ids.json
